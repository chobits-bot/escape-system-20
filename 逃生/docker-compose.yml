version: '3.8'

services:
  # ==================== EMQX MQTT Broker ====================
  emqx:
    image: emqx/emqx:5.5
    container_name: emqx
    ports:
      - "1883:1883"       # MQTT TCP
      - "8083:8083"       # MQTT WebSocket
      - "18083:18083"     # EMQX Dashboard (admin/public)
    environment:
      - EMQX_NAME=aiot-emqx
      - EMQX_HOST=127.0.0.1
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    restart: always

  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=aiot123456
      - MYSQL_DATABASE=aiot
      - MYSQL_CHARSET=utf8mb4
    volumes:
      - mysql_data:/var/lib/mysql
      - ./aiot/aiot-v2/manifest/deploy/sql/aiot.sql:/docker-entrypoint-initdb.d/01-aiot.sql
      - ./aiot/aiot-v2/manifest/deploy/sql/graph.sql:/docker-entrypoint-initdb.d/02-graph.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    restart: always

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # ==================== InfluxDB v2 ====================
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=aiot123456
      - DOCKER_INFLUXDB_INIT_ORG=aiot
      - DOCKER_INFLUXDB_INIT_BUCKET=aiot
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=aiot-influxdb-token-change-me
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: always

  # ==================== Go 后端 ====================
  aiot-backend:
    build:
      context: ./aiot/aiot-v2
      dockerfile: Dockerfile
    container_name: aiot-backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
      - influxdb
      - emqx
    restart: always

  # ==================== Vue 前端 ====================
  aiot-frontend:
    build:
      context: ./aiot/aiot-vue
      dockerfile: Dockerfile
    container_name: aiot-frontend
    ports:
      - "5173:80"
    depends_on:
      - aiot-backend
    restart: always

volumes:
  emqx_data:
  emqx_log:
  mysql_data:
  redis_data:
  influxdb_data:
